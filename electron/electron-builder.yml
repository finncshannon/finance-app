appId: com.financeapp.desktop
productName: Spectre
copyright: Copyright 2026
npmRebuild: false

directories:
  output: release
  buildResources: resources

files:
  - dist/*.js
  - dist/*.js.map
  - package.json

extraResources:
  - from: resources/python
    to: python
    filter:
      - "**/*"
  - from: ../frontend/dist
    to: frontend/dist
  - from: ../backend
    to: backend
    filter:
      - "**/*.py"
      - "**/*.json"
      - "requirements.txt"
      - "!__pycache__"
      - "!**/__pycache__"
      - "!*.pyc"
      - "!**/*.pyc"
      - "!.pytest_cache"
      - "!**/tests/**"

publish:
  provider: github
  owner: finncshannon
  repo: finance-app
  releaseType: release

win:
  target:
    - target: nsis
      arch:
        - x64
  icon: resources/icon.ico
  signAndEditExecutable: false

mac:
  target:
    - target: dmg
      arch:
        - x64
        - arm64
  icon: resources/icon.icns
  category: public.app-category.finance

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  installerIcon: resources/icon.ico

dmg:
  contents:
    - x: 130
      y: 220
    - x: 410
      y: 220
      type: link
      path: /Applications
